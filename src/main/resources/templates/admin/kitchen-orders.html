<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Theo doi order bep | Rivière Restaurant</title>
    <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin">
    <div class="container">
        <span class="section-tag">Kitchen orders</span>
        <h1>Theo dỗi đơn đang phục vụ</h1>
        <p>Danh sách món đã gọi theo từng bàn từ các booking đang hoạt động.</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="table-card">
            <div class="table-card-head">
                <div>
                    <span class="section-tag">Bếp</span>
                    <h3>Món cần xử lý</h3>
                </div>
            </div>

            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Số bàn</th>
                        <th>Tầng</th>
                        <th>Loại phòng</th>
                        <th>Món ăn</th>
                        <th>Số lượng</th>
                        <th>Ghi chú</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${kitchenOrders}">
                        <td th:text="${order.tableNumber}">T1-01</td>
                        <td th:text="${order.floor}">Tang 1</td>
                        <td th:text="${order.roomType}">VIP</td>
                        <td th:text="${order.itemName}">Vit quay Bac Kinh</td>
                        <td th:text="${order.quantity}">2</td>
                        <td th:text="${order.note != null and !#strings.isEmpty(order.note) ? order.note : '-'}">Khong hanh</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(kitchenOrders)}">
                        <td colspan="6" class="empty-cell">Chua co mon nao can xu ly.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
